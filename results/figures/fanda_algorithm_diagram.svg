<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1800" viewBox="0 0 1200 1800">
<defs>
  <radialGradient id="bgfade" cx="50%" cy="45%" r="70%">
    <stop offset="0%" stop-color="#ffffff" />
    <stop offset="100%" stop-color="#eef1f6" />
  </radialGradient>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111" />
  </marker>
</defs>
<rect x="0" y="0" width="1200" height="1800" fill="url(#bgfade)" />
<text x="600.0" y="80.0" font-size="54" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">FAnDa: Frozen-Anchor Contrastive Decoder</text>
<rect x="120.0" y="140.0" width="720.0" height="90.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="18.0" />
<line x1="120.0" y1="198.0" x2="840.0" y2="198.0" stroke="#1947a8" stroke-width="2.0" />
<circle cx="158.0" cy="169.0" r="20.0" fill="#1947a8" stroke="#1947a8" stroke-width="2.0" />
<text x="158.0" y="177.0" font-size="28" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">1</text>
<text x="198.0" y="178.0" font-size="28" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="bold">Input prefix at step t</text>
<text x="142.0" y="232.0" font-size="26" fill="#333333" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">Current prefix:  x_&lt;t</text>
<rect x="120.0" y="262.0" width="720.0" height="170.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="18.0" />
<line x1="120.0" y1="320.0" x2="840.0" y2="320.0" stroke="#1947a8" stroke-width="2.0" />
<circle cx="158.0" cy="291.0" r="20.0" fill="#1947a8" stroke="#1947a8" stroke-width="2.0" />
<text x="158.0" y="299.0" font-size="28" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">2</text>
<text x="198.0" y="300.0" font-size="28" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="bold">Initialization forward pass</text>
<text x="142.0" y="354.0" font-size="24" fill="#333333" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">Final-layer logits:</text>
<line x1="480.0" y1="344.0" x2="480.0" y2="417.0" stroke="#b8b8b8" stroke-width="2.0" />
<text x="142.0" y="450.0" font-size="24" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">z_F^(0)</text>
<text x="206.0" y="374.0" font-size="22" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">Final-layer logits:</text>
<text x="308.0" y="424.0" font-size="32" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">z_F^(0)</text>
<text x="550.0" y="374.0" font-size="22" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">Candidate shallow logits:</text>
<text x="680.0" y="424.0" font-size="30" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">{ z_l^(0) }</text>
<rect x="120.0" y="464.0" width="720.0" height="220.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="18.0" />
<line x1="120.0" y1="522.0" x2="840.0" y2="522.0" stroke="#1947a8" stroke-width="2.0" />
<circle cx="158.0" cy="493.0" r="20.0" fill="#1947a8" stroke="#1947a8" stroke-width="2.0" />
<text x="158.0" y="501.0" font-size="28" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">3</text>
<text x="198.0" y="502.0" font-size="28" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="bold">Choose and freeze anchor layer</text>
<rect x="134.0" y="536.0" width="692.0" height="134.0" fill="#ffffff" stroke="#7d9be0" stroke-width="2.0" rx="14.0" stroke-dasharray="10 6" />
<text x="152.0" y="570.0" font-size="24" fill="#333333" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">select one shallow anchor at t = 0</text>
<text x="152.0" y="618.0" font-size="24" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">l* = argmax_l JSD( softmax(z_F^(0)/tau), softmax(z_l^(0)/tau) )</text>
<text x="152.0" y="666.0" font-size="24" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">freeze l* for all later decoding steps</text>
<text x="152.0" y="714.0" font-size="24" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">no token-level reselection afterward</text>
<rect x="120.0" y="716.0" width="720.0" height="220.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="18.0" />
<line x1="120.0" y1="774.0" x2="840.0" y2="774.0" stroke="#1947a8" stroke-width="2.0" />
<circle cx="158.0" cy="745.0" r="20.0" fill="#1947a8" stroke="#1947a8" stroke-width="2.0" />
<text x="158.0" y="753.0" font-size="28" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">4</text>
<text x="198.0" y="754.0" font-size="28" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="bold">Autoregressive contrast step</text>
<text x="142.0" y="808.0" font-size="24" fill="#333333" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">rerun model on the updated prefix</text>
<rect x="270.0" y="812.0" width="420.0" height="84.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.2" rx="14.0" />
<text x="480.0" y="865.0" font-size="36" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="middle" font-weight="normal">s^(t) = z_F^(t) - z_(l*)^(t)</text>
<text x="142.0" y="904.0" font-size="24" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">raw-logit subtraction, no relative-top filter</text>
<text x="308.0" y="921.0" font-size="22" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">raw-logit subtraction, no relative-top filter</text>
<rect x="120.0" y="968.0" width="720.0" height="180.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="18.0" />
<line x1="120.0" y1="1026.0" x2="840.0" y2="1026.0" stroke="#1947a8" stroke-width="2.0" />
<circle cx="158.0" cy="997.0" r="20.0" fill="#1947a8" stroke="#1947a8" stroke-width="2.0" />
<text x="158.0" y="1005.0" font-size="28" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">5</text>
<text x="198.0" y="1006.0" font-size="28" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="bold">Choose / score token at step t</text>
<rect x="138.0" y="1040.0" width="280.0" height="96.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="12.0" />
<text x="278.0" y="1072.0" font-size="22" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">Free generation:</text>
<text x="278.0" y="1126.0" font-size="26" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="middle" font-weight="normal">y_t = argmax s^(t)</text>
<rect x="440.0" y="1040.0" width="380.0" height="96.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="12.0" />
<text x="630.0" y="1072.0" font-size="22" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">TruthfulQA MC scoring:</text>
<text x="630.0" y="1126.0" font-size="26" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="middle" font-weight="normal">add log softmax(s^(t))[gold_t]</text>
<rect x="120.0" y="1180.0" width="720.0" height="172.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="18.0" />
<line x1="120.0" y1="1238.0" x2="840.0" y2="1238.0" stroke="#1947a8" stroke-width="2.0" />
<circle cx="158.0" cy="1209.0" r="20.0" fill="#1947a8" stroke="#1947a8" stroke-width="2.0" />
<text x="158.0" y="1217.0" font-size="28" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">6</text>
<text x="198.0" y="1218.0" font-size="28" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="bold">Append token and continue</text>
<text x="142.0" y="1272.0" font-size="24" fill="#333333" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">prefix &lt;- prefix + token_t</text>
<text x="142.0" y="1320.0" font-size="24" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">t &lt;- t + 1</text>
<text x="142.0" y="1368.0" font-size="24" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">keep the same frozen anchor l*</text>
<text x="164.0" y="1302.0" font-size="24" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">•  prefix &lt;- prefix + token_t</text>
<text x="164.0" y="1344.0" font-size="24" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">•  t &lt;- t + 1</text>
<text x="164.0" y="1386.0" font-size="24" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">•  keep the same frozen anchor l*</text>
<line x1="480.0" y1="230.0" x2="480.0" y2="262.0" stroke="#111111" stroke-width="4.0" marker-end="url(#arrow)" />
<line x1="480.0" y1="432.0" x2="480.0" y2="464.0" stroke="#111111" stroke-width="4.0" marker-end="url(#arrow)" />
<line x1="480.0" y1="684.0" x2="480.0" y2="716.0" stroke="#111111" stroke-width="4.0" marker-end="url(#arrow)" />
<line x1="480.0" y1="936.0" x2="480.0" y2="968.0" stroke="#111111" stroke-width="4.0" marker-end="url(#arrow)" />
<line x1="480.0" y1="1148.0" x2="480.0" y2="1180.0" stroke="#111111" stroke-width="4.0" marker-end="url(#arrow)" />
<line x1="480.0" y1="1352.0" x2="480.0" y2="1382.0" stroke="#111111" stroke-width="4.0" marker-end="url(#arrow)" />
<line x1="46.0" y1="1266.0" x2="46.0" y2="178.0" stroke="#111111" stroke-width="4.0" />
<line x1="46.0" y1="1266.0" x2="108.0" y2="1266.0" stroke="#111111" stroke-width="4.0" />
<line x1="46.0" y1="178.0" x2="108.0" y2="178.0" stroke="#111111" stroke-width="4.0" marker-end="url(#arrow)" />
<rect x="890.0" y="696.0" width="250.0" height="320.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="16.0" />
<text x="910.0" y="740.0" font-size="24" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="bold">Compared with DoLa</text>
<text x="910.0" y="788.0" font-size="21" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">- raw logits, not log-prob contrast</text>
<text x="910.0" y="846.0" font-size="21" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">- anchor chosen once, then frozen</text>
<text x="910.0" y="904.0" font-size="21" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">- no relative-top filter</text>
<text x="910.0" y="962.0" font-size="21" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">- no per-token shallow-layer switching</text>
<text x="600.0" y="1424.0" font-size="28" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">Frozen-anchor pattern</text>
<line x1="80.0" y1="1492.0" x2="1080.0" y2="1492.0" stroke="#111111" stroke-width="4.0" marker-end="url(#arrow)" />
<line x1="130.0" y1="1480.0" x2="130.0" y2="1504.0" stroke="#111111" stroke-width="4.0" />
<text x="130.0" y="1466.0" font-size="24" fill="#123a8f" font-family="Times New Roman, Times, serif" text-anchor="middle" font-weight="normal">t = 0</text>
<line x1="370.0" y1="1480.0" x2="370.0" y2="1504.0" stroke="#111111" stroke-width="4.0" />
<text x="370.0" y="1466.0" font-size="24" fill="#123a8f" font-family="Times New Roman, Times, serif" text-anchor="middle" font-weight="normal">t = 1</text>
<line x1="610.0" y1="1480.0" x2="610.0" y2="1504.0" stroke="#111111" stroke-width="4.0" />
<text x="610.0" y="1466.0" font-size="24" fill="#123a8f" font-family="Times New Roman, Times, serif" text-anchor="middle" font-weight="normal">t = 2</text>
<line x1="850.0" y1="1480.0" x2="850.0" y2="1504.0" stroke="#111111" stroke-width="4.0" />
<text x="850.0" y="1466.0" font-size="24" fill="#123a8f" font-family="Times New Roman, Times, serif" text-anchor="middle" font-weight="normal">t = 3</text>
<line x1="1050.0" y1="1480.0" x2="1050.0" y2="1504.0" stroke="#111111" stroke-width="4.0" />
<text x="1050.0" y="1466.0" font-size="24" fill="#123a8f" font-family="Times New Roman, Times, serif" text-anchor="middle" font-weight="normal">t = 4+</text>
<rect x="84.0" y="1350.0" width="170.0" height="112.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="12.0" />
<text x="169.0" y="1385.0" font-size="22" fill="#123a8f" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">refresh</text>
<text x="169.0" y="1418.0" font-size="18" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="normal">compute max JSD</text>
<text x="169.0" y="1446.0" font-size="18" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="normal">and set l*</text>
<rect x="300.0" y="1350.0" width="170.0" height="112.0" fill="#ffffff" stroke="#9da9c7" stroke-width="2.0" rx="12.0" />
<text x="385.0" y="1385.0" font-size="22" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">reuse</text>
<text x="385.0" y="1418.0" font-size="18" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="normal">keep frozen</text>
<text x="385.0" y="1446.0" font-size="18" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="normal">anchor l*</text>
<rect x="540.0" y="1350.0" width="170.0" height="112.0" fill="#ffffff" stroke="#9da9c7" stroke-width="2.0" rx="12.0" />
<text x="625.0" y="1385.0" font-size="22" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">reuse</text>
<text x="625.0" y="1418.0" font-size="18" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="normal">keep frozen</text>
<text x="625.0" y="1446.0" font-size="18" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="normal">anchor l*</text>
<rect x="780.0" y="1350.0" width="170.0" height="112.0" fill="#ffffff" stroke="#9da9c7" stroke-width="2.0" rx="12.0" />
<text x="865.0" y="1385.0" font-size="22" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">reuse</text>
<text x="865.0" y="1418.0" font-size="18" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="normal">keep frozen</text>
<text x="865.0" y="1446.0" font-size="18" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="normal">anchor l*</text>
<rect x="952.0" y="1350.0" width="210.0" height="112.0" fill="#ffffff" stroke="#9da9c7" stroke-width="2.0" rx="12.0" />
<text x="1057.0" y="1385.0" font-size="22" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="bold">reuse</text>
<text x="1057.0" y="1418.0" font-size="18" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="normal">same frozen anchor</text>
<text x="1057.0" y="1446.0" font-size="18" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="middle" font-weight="normal">until EOS</text>
<text x="1090.0" y="1502.0" font-size="22" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="normal">time (t)</text>
<rect x="54.0" y="1682.0" width="1092.0" height="84.0" fill="#ffffff" stroke="#1947a8" stroke-width="2.0" rx="14.0" />
<text x="94.0" y="1716.0" font-size="20" fill="#111111" font-family="Arial, Helvetica, sans-serif" text-anchor="start" font-weight="bold">Notation:</text>
<text x="212.0" y="1716.0" font-size="18" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">z_F^(t) = final-layer logits;  z_(l*)^(t) = logits from the frozen shallow anchor;</text>
<text x="72.0" y="1748.0" font-size="18" fill="#111111" font-family="Times New Roman, Times, serif" text-anchor="start" font-weight="normal">l* = selected shallow layer index fixed after initialization;  s^(t) = contrast scores;  y_t = generated token.</text>
</svg>